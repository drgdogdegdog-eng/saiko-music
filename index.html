<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Saiko Music</title>

<style>
body {
  margin: 0;
  background: #121212;
  color: white;
  font-family: Arial;
}

.header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.song {
  display: flex;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #333;
}

.song img {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  margin-right: 10px;
}

.song-info {
  flex: 1;
}

.song-title {
  font-size: 16px;
}

.song-artist {
  font-size: 12px;
  color: gray;
}

button {
  background: #1db954;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 20px;
}
</style>

</head>

<body>

<div class="header">🎧 Saiko Music</div>

<div class="song">
  <img src="https://i.imgur.com/8Km9tUL.jpg">
  <div class="song-info">
    <div class="song-title">Song 1</div>
    <div class="song-artist">Artist</div>
  </div>
  <button onclick="playSong(0)">▶</button>
</div>

<div class="song">
  <img src="https://i.imgur.com/8Km9tUL.jpg">
  <div class="song-info">
    <div class="song-title">Song 2</div>
    <div class="song-artist">Artist</div>
  </div>
  <button onclick="playSong(1)">▶</button>
</div>

<audio id="audio"></audio>

<script>
const songs = [
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
];

function playSong(index) {
  const audio = document.getElementById("audio");
  audio.src = songs[index];
  audio.play();
}
</script>

</body>
</html>
